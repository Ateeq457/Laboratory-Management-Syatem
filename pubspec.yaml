name: lab_system
description: "Thal-Care Diagnostic Booking System - Professional healthcare lab booking app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ---------------- UI CORE ----------------
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # ---------------- STATE MANAGEMENT ----------------
  flutter_riverpod: ^2.5.1
  get_it: ^7.7.0

  # ---------------- BACKEND ----------------
  supabase_flutter: ^2.8.1
  dio: ^5.7.0

  # ---------------- STORAGE ----------------
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # ---------------- FILES / PDF ----------------
  syncfusion_flutter_pdfviewer: ^28.1.0
  open_filex: ^4.7.0

  # ---------------- UTILITIES ----------------
  intl: ^0.19.0
  connectivity_plus: ^6.1.0
  logger: ^2.4.0

  # ---------------- NAVIGATION ----------------
  go_router: ^14.2.7

  # ---------------- CALENDAR (BOOKING SYSTEM) ----------------
  table_calendar: ^3.1.2

  # ---------------- SPLASH SCREEN ----------------
  flutter_native_splash: ^2.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true

  assets:
    - assets/json/


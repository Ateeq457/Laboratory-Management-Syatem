name: lab_system
description: "Thal-Care Diagnostic Booking System - Professional healthcare lab booking app"
publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ---------------- UI CORE ----------------
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  google_fonts: ^6.2.1

  # ---------------- STATE MANAGEMENT ----------------
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  get_it: ^8.0.2

  # ---------------- BACKEND ----------------
  supabase_flutter: ^2.8.4
  dio: ^5.8.0+1
  pretty_dio_logger: ^1.4.0

  # ---------------- STORAGE ----------------
  shared_preferences: ^2.5.1
  path_provider: ^2.1.5
  flutter_secure_storage: ^9.2.2

  # ---------------- FILES / PDF ----------------
  syncfusion_flutter_pdfviewer: ^29.1.33
  open_file: ^3.5.10
  permission_handler: ^12.0.0+1

  # ---------------- UTILITIES ----------------
  intl: ^0.20.2
  connectivity_plus: ^6.1.3
  logger: ^2.5.0
  uuid: ^4.5.1
  equatable: ^2.0.7

  # ---------------- NAVIGATION ----------------
  go_router: ^15.1.1

  # ---------------- CALENDAR (BOOKING SYSTEM) ----------------
  table_calendar: ^3.1.3

  # ---------------- SPLASH SCREEN ----------------
  flutter_native_splash: ^2.4.4

  # ---------------- DATE & TIME ----------------
  timezone: ^0.10.0

  # ---------------- ANIMATIONS ----------------
  animate_do: ^4.2.0

  # ---------------- NETWORK CACHE ----------------
  flutter_cache_manager: ^3.4.1
  device_info_plus: 11.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # ---------------- CODE GENERATION ----------------
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.0
  json_annotation: ^4.9.0

flutter:
  uses-material-design: true

  assets:
    - assets/json/
    # - assets/images/
    # - assets/icons/
    # - assets/animations/

  # fonts:
  #   - family: DMSans
  #     fonts:
  #       - asset: assets/fonts/DMSans-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/DMSans-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/DMSans-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/DMSans-Bold.ttf
  #         weight: 700

flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo.png

  android_12:
    color: "#FFFFFF"
    image: assets/images/logo.png

  web: false